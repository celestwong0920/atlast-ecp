<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>
  
  <rect width="900" height="480" rx="12" fill="#F7F4EE"/>
  <rect width="900" height="480" rx="12" fill="none" stroke="#E6E1D9" stroke-width="1"/>
  
  <!-- Title -->
  <text x="450" y="35" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="16" text-anchor="middle">ATLAST Protocol Ecosystem</text>
  
  <!-- Protocol Layer (top) -->
  <g transform="translate(30, 55)">
    <rect width="840" height="130" rx="10" fill="white" stroke="#1D4ED8" stroke-width="1.5" opacity="0.9"/>
    <text x="20" y="25" fill="#1D4ED8" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11">PROTOCOL LAYER</text>
    
    <!-- SDKs -->
    <g transform="translate(20, 40)">
      <rect width="120" height="70" rx="6" fill="#EFF4FF" stroke="#BFDBFE" stroke-width="1"/>
      <text x="60" y="25" fill="#1D4ED8" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Python SDK</text>
      <text x="60" y="42" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" text-anchor="middle">pip install atlast-ecp</text>
      <text x="60" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">387 tests · 19 modules</text>
    </g>
    
    <g transform="translate(155, 40)">
      <rect width="120" height="70" rx="6" fill="#EFF4FF" stroke="#BFDBFE" stroke-width="1"/>
      <text x="60" y="25" fill="#1D4ED8" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">TypeScript SDK</text>
      <text x="60" y="42" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" text-anchor="middle">npm i atlast-ecp-ts</text>
      <text x="60" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">12 tests</text>
    </g>
    
    <g transform="translate(290, 40)">
      <rect width="120" height="70" rx="6" fill="#EFF4FF" stroke="#BFDBFE" stroke-width="1"/>
      <text x="60" y="25" fill="#1D4ED8" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Go SDK</text>
      <text x="60" y="42" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" text-anchor="middle">go get atlast-ecp</text>
      <text x="60" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">Zero dependencies</text>
    </g>
    
    <g transform="translate(425, 40)">
      <rect width="120" height="70" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
      <text x="60" y="25" fill="#059669" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">CLI</text>
      <text x="60" y="42" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" text-anchor="middle">atlast &lt;command&gt;</text>
      <text x="60" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">14 subcommands</text>
    </g>
    
    <g transform="translate(560, 40)">
      <rect width="120" height="70" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
      <text x="60" y="25" fill="#059669" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Proxy</text>
      <text x="60" y="42" fill="#6B7280" font-family="JetBrains Mono, monospace" font-weight="400" font-size="9" text-anchor="middle">atlast run &lt;cmd&gt;</text>
      <text x="60" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">Zero code · 9+ LLMs</text>
    </g>
    
    <g transform="translate(695, 40)">
      <rect width="130" height="70" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
      <text x="65" y="25" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Adapters</text>
      <text x="65" y="42" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">LangChain · CrewAI</text>
      <text x="65" y="58" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="9" text-anchor="middle">MCP · OpenClaw · OTel</text>
    </g>
  </g>
  
  <!-- Arrows down -->
  <g transform="translate(200, 192)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="-5,25 0,35 5,25" fill="#E6E1D9"/>
  </g>
  <g transform="translate(700, 192)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="-5,25 0,35 5,25" fill="#E6E1D9"/>
  </g>
  
  <!-- Evidence Layer (middle) -->
  <g transform="translate(30, 230)">
    <rect width="840" height="90" rx="10" fill="white" stroke="#059669" stroke-width="1.5" opacity="0.9"/>
    <text x="20" y="25" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11">EVIDENCE LAYER</text>
    
    <g transform="translate(20, 38)">
      <rect width="190" height="38" rx="6" fill="#ECFDF5"/>
      <text x="95" y="24" fill="#059669" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">ECP Records (JSONL)</text>
    </g>
    
    <g transform="translate(225, 38)">
      <rect width="140" height="38" rx="6" fill="#ECFDF5"/>
      <text x="70" y="24" fill="#059669" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Hash Chains</text>
    </g>
    
    <g transform="translate(380, 38)">
      <rect width="150" height="38" rx="6" fill="#ECFDF5"/>
      <text x="75" y="24" fill="#059669" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">A2A Verification</text>
    </g>
    
    <g transform="translate(545, 38)">
      <rect width="140" height="38" rx="6" fill="#ECFDF5"/>
      <text x="70" y="24" fill="#059669" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Merkle Proofs</text>
    </g>
    
    <g transform="translate(700, 38)">
      <rect width="125" height="38" rx="6" fill="#ECFDF5"/>
      <text x="62" y="24" fill="#059669" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Insights</text>
    </g>
  </g>
  
  <!-- Arrows down -->
  <g transform="translate(250, 327)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="-5,25 0,35 5,25" fill="#E6E1D9"/>
  </g>
  <g transform="translate(650, 327)">
    <line x1="0" y1="0" x2="0" y2="25" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="-5,25 0,35 5,25" fill="#E6E1D9"/>
  </g>
  
  <!-- Server Layer (bottom) -->
  <g transform="translate(30, 365)">
    <rect width="400" height="90" rx="10" fill="white" stroke="#B45309" stroke-width="1.5" opacity="0.9"/>
    <text x="20" y="25" fill="#B45309" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11">SELF-HOSTED</text>
    
    <g transform="translate(20, 38)">
      <rect width="170" height="38" rx="6" fill="#FFFBEB"/>
      <text x="85" y="16" fill="#B45309" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Reference Server</text>
      <text x="85" y="32" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10" text-anchor="middle">FastAPI + SQLite</text>
    </g>
    
    <g transform="translate(205, 38)">
      <rect width="170" height="38" rx="6" fill="#FFFBEB"/>
      <text x="85" y="16" fill="#B45309" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">Docker</text>
      <text x="85" y="32" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10" text-anchor="middle">docker compose up</text>
    </g>
  </g>
  
  <g transform="translate(460, 365)">
    <rect width="410" height="90" rx="10" fill="white" stroke="#7C3AED" stroke-width="1.5" opacity="0.9"/>
    <text x="20" y="25" fill="#7C3AED" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11">PLATFORM (OPTIONAL)</text>
    
    <g transform="translate(20, 38)">
      <rect width="170" height="38" rx="6" fill="#F5F3FF"/>
      <text x="85" y="16" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">LLaChat.com</text>
      <text x="85" y="32" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10" text-anchor="middle">Profiles · Leaderboard</text>
    </g>
    
    <g transform="translate(205, 38)">
      <rect width="180" height="38" rx="6" fill="#F5F3FF"/>
      <text x="90" y="16" fill="#7C3AED" font-family="Inter, sans-serif" font-weight="600" font-size="12" text-anchor="middle">EAS on Base</text>
      <text x="90" y="32" fill="#9CA3AF" font-family="Inter, sans-serif" font-weight="400" font-size="10" text-anchor="middle">On-chain anchoring</text>
    </g>
  </g>
</svg>
