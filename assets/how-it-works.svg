<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>
  
  <rect width="900" height="320" rx="12" fill="#F7F4EE"/>
  <rect width="900" height="320" rx="12" fill="none" stroke="#E6E1D9" stroke-width="1"/>
  
  <!-- Step 1: Agent Acts -->
  <g transform="translate(40, 40)">
    <rect width="170" height="120" rx="10" fill="white" stroke="#E6E1D9" stroke-width="1"/>
    <rect width="170" height="4" rx="2" fill="#1D4ED8" y="0"/>
    <text x="85" y="35" fill="#1D4ED8" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11" text-anchor="middle">STEP 1</text>
    <text x="85" y="58" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="15" text-anchor="middle">Agent Acts</text>
    <text x="85" y="80" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">LLM call, tool use,</text>
    <text x="85" y="95" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">or message sent</text>
    <text x="85" y="112" fill="#9CA3AF" font-family="JetBrains Mono, monospace" font-weight="400" font-size="10" text-anchor="middle">T+0ms</text>
  </g>
  
  <!-- Arrow 1→2 -->
  <g transform="translate(218, 92)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E6E1D9"/>
  </g>
  
  <!-- Step 2: Hash Locally -->
  <g transform="translate(275, 40)">
    <rect width="170" height="120" rx="10" fill="white" stroke="#E6E1D9" stroke-width="1"/>
    <rect width="170" height="4" rx="2" fill="#059669" y="0"/>
    <text x="85" y="35" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11" text-anchor="middle">STEP 2</text>
    <text x="85" y="58" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="15" text-anchor="middle">Hash Locally</text>
    <text x="85" y="80" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">SHA-256 fingerprint</text>
    <text x="85" y="95" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">Content never leaves</text>
    <text x="85" y="112" fill="#059669" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" text-anchor="middle">sha256:2cf24d...</text>
  </g>
  
  <!-- Arrow 2→3 -->
  <g transform="translate(453, 92)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E6E1D9"/>
  </g>
  
  <!-- Step 3: Sign & Chain -->
  <g transform="translate(510, 40)">
    <rect width="170" height="120" rx="10" fill="white" stroke="#E6E1D9" stroke-width="1"/>
    <rect width="170" height="4" rx="2" fill="#7C3AED" y="0"/>
    <text x="85" y="35" fill="#7C3AED" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11" text-anchor="middle">STEP 3</text>
    <text x="85" y="58" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="15" text-anchor="middle">Sign &amp; Chain</text>
    <text x="85" y="80" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">Ed25519 signature</text>
    <text x="85" y="95" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">Linked to all previous</text>
    <text x="85" y="112" fill="#7C3AED" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" text-anchor="middle">chain: unbreakable</text>
  </g>
  
  <!-- Arrow 3→4 -->
  <g transform="translate(688, 92)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#E6E1D9" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#E6E1D9"/>
  </g>
  
  <!-- Step 4: Anchor -->
  <g transform="translate(735, 40)">
    <rect width="130" height="120" rx="10" fill="white" stroke="#E6E1D9" stroke-width="1"/>
    <rect width="130" height="4" rx="2" fill="#B45309" y="0"/>
    <text x="65" y="35" fill="#B45309" font-family="JetBrains Mono, monospace" font-weight="600" font-size="11" text-anchor="middle">STEP 4</text>
    <text x="65" y="58" fill="#18160F" font-family="Inter, sans-serif" font-weight="700" font-size="14" text-anchor="middle">Anchor</text>
    <text x="65" y="80" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">Merkle root to</text>
    <text x="65" y="95" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="11" text-anchor="middle">Base blockchain</text>
    <text x="65" y="112" fill="#B45309" font-family="JetBrains Mono, monospace" font-weight="500" font-size="10" text-anchor="middle">~$0.0001/hr</text>
  </g>
  
  <!-- Bottom: Privacy callout -->
  <g transform="translate(40, 195)">
    <rect width="825" height="90" rx="10" fill="white" stroke="#059669" stroke-width="1" stroke-dasharray="4,4" opacity="0.8"/>
    <text x="30" y="35" fill="#059669" font-family="Inter, sans-serif" font-weight="700" font-size="14">🔒 Privacy by Design</text>
    <text x="30" y="58" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="12">Your prompts and responses never leave your device. ECP records contain only SHA-256 hashes.</text>
    <text x="30" y="78" fill="#6B7280" font-family="Inter, sans-serif" font-weight="400" font-size="12">Publishing is opt-in. Local by default. Fail-open: recording failures never crash your agent.</text>
  </g>
</svg>
